<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ThunderID SDK Banners</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #030c18;
  padding: 48px;
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

.banners {
  display: flex;
  flex-direction: column;
  gap: 36px;
}

.banner {
  width: 1000px;
  height: 420px;
  background: #071526;
  border-radius: 16px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
}

.layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.layer-gradient {
  background:
    radial-gradient(ellipse 85% 75% at 15% 72%, #0d2d52 0%, transparent 58%),
    radial-gradient(ellipse 55% 55% at 88% 18%, #071e3a 0%, transparent 50%),
    linear-gradient(160deg, #071a30 0%, #040e1c 100%);
}

.layer-grid {
  background-image:
    linear-gradient(rgba(54,136,255,0.032) 1px, transparent 1px),
    linear-gradient(90deg, rgba(54,136,255,0.032) 1px, transparent 1px);
  background-size: 52px 52px;
}

.layer-glow {
  background: radial-gradient(ellipse 60% 48% at 50% 55%, rgba(54,136,255,0.09) 0%, transparent 70%);
}

/* Simple lightning bolt watermark */
.bolt-deco {
  position: absolute;
  right: -28px;
  top: -18px;
  width: 200px;
  opacity: 0.18;
  pointer-events: none;
  z-index: 0;
}

.content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}

.badge {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  border: 1.5px solid rgba(54,136,255,0.32);
  border-radius: 100px;
  color: rgba(255,255,255,0.72);
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  background: rgba(54,136,255,0.07);
}

.logos-row {
  display: flex;
  align-items: center;
  gap: 18px;
}

.logo-box {
  width: 94px;
  height: 94px;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.logo-thunder {
  background: linear-gradient(145deg, #0a1e4a 0%, #0e2868 55%, #102e7a 100%);
  box-shadow: 0 0 40px rgba(54,136,255,0.3), inset 0 1.5px 0 rgba(255,255,255,0.12);
}

.plus-sign {
  font-size: 28px;
  color: rgba(255,255,255,0.3);
  font-weight: 200;
  line-height: 1;
  margin: 0 2px;
}

.pkg-name {
  font-size: 48px;
  font-weight: 800;
  color: white;
  letter-spacing: -1.5px;
  line-height: 1;
}

.pkg-name .scope {
  color: rgba(255,255,255,0.36);
  font-weight: 700;
}

.pkg-desc {
  font-size: 15.5px;
  color: rgba(255,255,255,0.46);
  text-align: center;
  max-width: 560px;
  line-height: 1.6;
}

.install-box {
  display: flex;
  align-items: center;
  gap: 9px;
  background: rgba(3,8,18,0.72);
  border: 1px solid rgba(54,136,255,0.18);
  border-radius: 9px;
  padding: 11px 20px;
}

.install-prompt {
  color: rgba(255,255,255,0.28);
  font-size: 13px;
  font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
  user-select: none;
}

.install-cmd {
  color: rgba(255,255,255,0.88);
  font-size: 13px;
  font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
}

.copy-btn {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.07);
  border-radius: 5px;
  margin-left: 5px;
  border: 1px solid rgba(255,255,255,0.08);
}

.tags {
  display: flex;
  gap: 7px;
}

.tag {
  padding: 4px 13px;
  border: 1px solid rgba(54,136,255,0.22);
  border-radius: 100px;
  color: rgba(255,255,255,0.5);
  font-size: 11.5px;
  font-weight: 500;
  background: rgba(54,136,255,0.05);
}
</style>

function createBanner(sdk) {
  return `
  <div class="banner">
    <div class="layer layer-gradient"></div>
    <div class="layer layer-grid"></div>
    <div class="layer layer-glow"></div>
    <div class="bolt-deco">${BOLT_DECO}</div>

    <div class="content">
      <div class="badge">${CHECK_ICON} ${sdk.badge}</div>

      <div class="logos-row">
        <div class="logo-box logo-thunder">${THUNDER_LOGO}</div>
        <span class="plus-sign">+</span>
        <div class="logo-box" style="${sdk.fwStyle}">${sdk.icon}</div>
      </div>

      <div class="pkg-name"><span class="scope">@thunderid/</span>${sdk.name}</div>
      <div class="pkg-desc">${sdk.desc}</div>

      ${sdk.hideInstall ? '' : `<div class="install-box">
        <span class="install-prompt">$</span>
        <span class="install-cmd">${sdk.installCmd || `npm install @thunderid/${sdk.name}`}</span>
        <div class="copy-btn">${COPY_ICON}</div>
      </div>`}

    </div>
  </div>`;
}

const THUNDER_LOGO_MAIN = `<svg width="92" height="114" viewBox="0 0 207 257" fill="none">
  <path d="M55.5 26.4L58.9 0H0V26.4H55.5Z" fill="white"/>
  <path d="M39.9 147.4L49.6 72.3H0V256.7H60.6L80.1 147.4H39.9Z" fill="#3688FF"/>
  <path d="M192.4 59.4C182.8 40.2 169 25.6 150.9 15.3 145.5 12.3 139.8 9.7 133.7 7.5L115.4 103.7H159.8L76.3 256.7H83.4C109.5 256.7 131.7 251.6 150.2 241.2 168.6 230.9 182.7 216.1 192.4 197 202.1 177.8 206.9 154.8 206.9 128 206.9 101.3 202.1 78.5 192.4 59.4Z" fill="#3688FF"/>
</svg>`;

function createRepoBanner() {
  return `
  <div class="banner" style="height:280px;">
    <div class="layer layer-gradient"></div>
    <div class="layer layer-glow"></div>
    <div class="content" style="flex-direction:row;gap:28px;align-items:center;">
      ${THUNDER_LOGO_MAIN}
      <span style="font-size:72px;font-weight:800;color:white;letter-spacing:-2.5px;line-height:1;">Thunder<span style="color:#3688FF;">ID</span></span>
    </div>
  </div>`;
}

const banners = document.getElementById('banners');
banners.innerHTML = createRepoBanner() + sdks.map(createBanner).join('');
</script>
